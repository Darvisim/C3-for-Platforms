name: MidnightBSD C3
on:
  workflow_dispatch:
  
jobs:
  build-midnightbsd:
    name: MidnightBSD (x64) ${{ matrix.version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        version: ['4.0.4']
    steps:
      - uses: actions/checkout@v6

      # STEP 1: Download artifact onto host
      - name: Fetch FreeBSD C3 Artifact from External Repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p c3-artifact
          gh run download 26011424603 \
            --repo Darvisim/c3c \
            --dir c3-artifact \
            || echo "Warning: Artifact download step had issues."

      # STEP 2: Setup VM
      - name: Setup MidnightBSD VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: midnightbsd
          version: ${{ matrix.version }}
          cpu_count: 4
          memory: 6G

      # STEP 3: VM Config 
      - name: Install Dependencies
        shell: cpa.sh {0}
        run: |
          sudo mport index
          for i in 1 2; do
            sudo mport install git curl bash unzip && break || sleep 10
          done

      # STEP 4: Pull test suites
      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c

      # STEP 5: Explode artifact cleanly without arbitrary wildcards
      - name: Extract FreeBSD Binary
        shell: cpa.sh {0}
        run: |
          # 1. Target the folder created by the 'gh run download' mechanism
          # It nests the contents within a folder matching the artifact name.
          cd ./c3-artifact/
          
          # 2. Extract nested archives using deterministic lookups
          if [ -d "c3-freebsd-Debug" ]; then
            cd c3-freebsd-Debug
            tar -xzf c3-freebsd-Debug.tar.gz || true
          elif [ -d "c3-freebsd-Release" ]; then
            cd c3-freebsd-Release
            tar -xzf c3-freebsd-Release.tar.gz || true
          fi

      # STEP 6: Run tests with a hardcoded fallback track path
      - name: Run Tests
        shell: cpa.sh {0}
        run: |
          # Check common pathing variations generated by package_build.sh
          if [ -f "./c3-artifact/c3-freebsd-Debug/c3c" ]; then
            TARGET_BIN="./c3-artifact/c3-freebsd-Debug/c3c"
          elif [ -f "./c3-artifact/c3-freebsd-Release/c3c" ]; then
            TARGET_BIN="./c3-artifact/c3-freebsd-Release/c3c"
          else
            # Default fallback if unpacked at the workspace root
            TARGET_BIN="./c3-artifact/c3c"
          fi
          
          chmod +x "$TARGET_BIN"
          ./c3c/scripts/tools/ci_tests.sh "$TARGET_BIN"
