name: MidnightBSD C3
on:
  workflow_dispatch:
  
jobs:
  build-midnightbsd:
    name: MidnightBSD (x64) ${{ matrix.version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        version: ['4.0.4']
    steps:
      - uses: actions/checkout@v6

      - name: Setup MidnightBSD VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: midnightbsd
          version: ${{ matrix.version }}
          cpu_count: 4
          memory: 6G

      - name: Install Dependencies
        shell: cpa.sh {0}
        run: |
          sudo mport index
          for i in 1 2; do
            sudo mport install git ninja cmake curl bash && break || sleep 10
          done

          sudo /raven/sbin/ravensw index
          sudo /raven/sbin/ravensw install lang/clang19

      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c

      - name: Build (Release)
        shell: cpa.sh {0}
        run: |
          export PATH="/raven/bin:/raven/sbin:$PATH"
          cmake -S c3c -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="/raven"
          cmake --build build-release

      - name: Build (Debug)
        shell: cpa.sh {0}
        run: |
          export PATH="/raven/bin:/raven/sbin:$PATH"
          cmake -S c3c -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="/raven"
          cmake --build build-debug

      - name: Run Tests
        shell: cpa.sh {0}
        run: ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c"

      - name: Package
        shell: cpa.sh {0}
        run: |
          ./c3c/scripts/tools/package_build.sh "./build-release/c3c" "c3-midnightbsd-Release" "tar"
          ./c3c/scripts/tools/package_build.sh "./build-debug/c3c" "c3-midnightbsd-Debug" "tar"

      - name: Upload Artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Release
          path: c3-midnightbsd-Release.tar.gz

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Debug
          path: c3-midnightbsd-Debug.tar.gz
