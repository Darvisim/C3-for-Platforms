name: CI
on:
  workflow_dispatch:
  
jobs:
  build-azl:
    name: Azure Linux (x64)
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/azurelinux-beta/base/core:4.0
    strategy:
      fail-fast: false
    steps: 
      - name: Bootstrap Core System Dependencies
        run: |
          dnf check-update || true
          dnf install -y git tar shadow-utils
        
      - uses: actions/checkout@v6
  
      - name: Install Development Build Tools
        run: |
          dnf check-update || true
          dnf install -y cmake clang libcurl-devel make ninja-build zstd libzstd-devel
          
      - name: Clone C3 Compiler Source
        run: |
          git clone --depth=1 https://github.com/c3lang/c3c
          
      - name: Build CMake (Release)
        run: |
          cmake -S c3c -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release -DC3_FETCH_LLVM=ON
          cmake --build build-release
  
      - name: Build CMake (Debug)
        run: |
          cmake -S c3c -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug -DC3_FETCH_LLVM=ON
          cmake --build build-debug
  
      - name: Run Unified Tests
        run: |
          ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c"
          
          


