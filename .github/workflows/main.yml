name: MidnightBSD C3
on:
  workflow_dispatch:
  
jobs:
  build-midnightbsd:
    name: MidnightBSD (x64) ${{ matrix.version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        version: ['4.0.4']
    steps:
      - uses: actions/checkout@v6

      - name: Setup MidnightBSD VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: midnightbsd
          version: ${{ matrix.version }}
          cpu_count: 4
          memory: 6G

      - name: Install Dependencies
        shell: cpa.sh {0}
        run: |
          sudo mport index
          for i in 1 2; do
            sudo mport install git ninja cmake curl bash ccache && break || sleep 10
          done

      - name: Setup GitHub Cache for ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ccache
          key: ${{ runner.os }}-ccache-llvm19-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-llvm19-

      - name: Build LLVM
        shell: cpa.sh {0}
        run: |
          sudo truncate -s 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mdconfig -a -t vnode -f /swapfile -u 99
          sudo swapon /dev/md99

          export CCACHE_DIR="/home/runner/.cache/ccache"
          ccache -M 2G
          ccache -s
          
          git clone --depth 1 -b release/19.x https://github.com/llvm/llvm-project.git /tmp/llvm-project
          cd /tmp/llvm-project

          echo 'echo x86_64-unknown-freebsd13.4' > /tmp/llvm-project/llvm/cmake/config.guess
          chmod +x /tmp/llvm-project/llvm/cmake/config.guess
          sed -i.bak 's/#elif defined(__FreeBSD__)/#elif defined(__FreeBSD__) \&\& 0/' /tmp/llvm-project/llvm/lib/Support/Unix/Path.inc
          sed -i.bak '/#if defined(__FreeBSD__)/a \
          extern "C" char **environ;
          ' /tmp/llvm-project/llvm/lib/Support/Unix/Program.inc
          
          cmake -S llvm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_HOST_TRIPLE="x86_64-unknown-freebsd13.4" \
            -DLLVM_DEFAULT_TARGET_TRIPLE="x86_64-unknown-freebsd13.4" \
            -DCMAKE_INSTALL_PREFIX=/usr/local/llvm19 \
            -DLLVM_PARALLEL_LINK_JOBS=1 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

          cmake --build build -j 4
          sudo cmake --install build
          
          ccache -s

      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c

      - name: Build (Release)
        shell: cpa.sh {0}
        run: |
          cmake -S c3c -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-release

      - name: Build (Debug)
        shell: cpa.sh {0}
        run: |
          cmake -S c3c -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-debug

      - name: Run Tests
        shell: cpa.sh {0}
        run: ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c"

      - name: Package
        shell: cpa.sh {0}
        run: |
          ./c3c/scripts/tools/package_build.sh "./build-release/c3c" "c3-midnightbsd-Release" "tar"
          ./c3c/scripts/tools/package_build.sh "./build-debug/c3c" "c3-midnightbsd-Debug" "tar"

      - name: Upload Artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Release
          path: c3-midnightbsd-Release.tar.gz

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Debug
          path: c3-midnightbsd-Debug.tar.gz
