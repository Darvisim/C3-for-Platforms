name: CI
on:
  workflow_dispatch:
  
jobs:
  build-android:
    name: Android (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { architecture: aarch64, runner: ubuntu-24.04-arm }
          - { architecture: x86_64, runner: ubuntu-24.04 }
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c
          
      - name: Setup Termux
        uses: Darvisim/setup-termux@main
        with:
          arch: ${{ matrix.architecture }}
          
      - name: Install Dependencies
        shell: termux {0}
        run: |
            pkg update -y
            pkg upgrade -y
            pkg install -y llvm binutils libgc build-essential cmake git libedit zlib clang make mlir llvm-tools libpolly python libllvm-static
            
      - name: Build CMake (Release)
        run: |
            cmake -S c3c -B build-release -DCMAKE_BUILD_TYPE=Release
            cmake --build build-release
            
      - name: Package artifacts (Release)
        run: |
            chmod +x ./c3c/scripts/tools/package_build.sh
            bash ./c3c/scripts/tools/package_build.sh "./build-release/c3c" "c3-android-${{ matrix.architecture }}-Release" "tar"
            
      - name: Build CMake (Debug)
        run: |
            cmake -S c3c -B build-debug -DCMAKE_BUILD_TYPE=Debug
            cmake --build build-debug
            
      - name: Run Unified Tests
        run: |
            bash ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c" "android"

      - name: Package Artifacts (Debug)
        run: |
            chmod +x ./c3c/scripts/tools/package_build.sh
            bash ./c3c/scripts/tools/package_build.sh "./build-debug/c3c" "c3-android-${{ matrix.architecture }}-Debug" "tar"

      - name: Upload Artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: c3-android-${{ matrix.architecture }}-Release
          path: c3-android-${{ matrix.architecture }}-Release.tar.gz

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: c3-android-${{ matrix.architecture }}-Debug
          path: c3-android-${{ matrix.architecture }}-Debug.tar.gz
