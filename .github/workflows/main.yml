name: CI
on:
  workflow_dispatch:
  
jobs:
  build-azl:
    name: Azure Linux (x64)
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/azurelinux-beta/base/core:4.0
    steps:
      - uses: actions/checkout@v6
  
      - name: Install Runtime Dependencies
        run: |
          # Azure Linux 4.0 uses standard dnf instead of tdnf
          dnf check-update || true
          dnf install -y shadow-utils gcc make tar
  
      - name: Test
        run: |
          echo "Running tests on Azure Linux 4.0..."
          # Insert your primary testing command below (e.g., make test, npm test, pytest)
          gcc --version
          
          


