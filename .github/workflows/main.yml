name: CI
on:
  workflow_dispatch:
  
jobs:
  build-midnightbsd:
    if: false
    name: MidnightBSD (x64) ${{ matrix.version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        version: ['4.0.4']
    steps:
      - uses: actions/checkout@v6

      - name: Setup MidnightBSD VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: midnightbsd
          version: ${{ matrix.version }}
          cpu_count: 4
          memory: 6G

      - name: Install Dependencies
        shell: cpa.sh {0}
        run: |
          sudo mport index
          sudo mport upgrade
          sudo mport install git ninja cmake llvm19 curl bash && break || sleep 10

      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c

      - name: Build (Release)
        shell: cpa.sh {0}
        run: |
          cmake -S c3c -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-release

      - name: Build (Debug)
        shell: cpa.sh {0}
        run: |
          cmake -S c3c -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-debug

      - name: Run Tests
        shell: cpa.sh {0}
        run: ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c"

      - name: Package
        shell: cpa.sh {0}
        run: |
          ./c3c/scripts/tools/package_build.sh "./build-release/c3c" "c3-midnightbsd-Release" "tar"
          ./c3c/scripts/tools/package_build.sh "./build-debug/c3c" "c3-midnightbsd-Debug" "tar"

      - name: Upload Artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Release
          path: c3-midnightbsd-Release.tar.gz

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: c3-midnightbsd-Debug
          path: c3-midnightbsd-Debug.tar.gz

  build-android:
    name: Android (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: aarch64
            runner: ubuntu-24.04-arm
          - architecture: x86_64
            runner: ubuntu-24.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Checkout C3 Repository
        uses: actions/checkout@v6
        with:
          repository: c3lang/c3c
          path: c3c
          
      - name: Setup BlissOS VM
        uses: vmactions/blissos-vm@v1
        with:
          envs: 'BUILD_TYPE'
          run: |
            # 1. Update packages inside the VM
            pkg update -y
            pkg upgrade -y
            
            # 2. Install build requirements natively
            pkg install -y llvm binutils libgc build-essential cmake git libedit zlib clang make mlir llvm-tools libpolly python libllvm-static
            
            # 3. Compile the Release version
            cmake -S c3c -B build-release -DCMAKE_BUILD_TYPE=Release
            cmake --build build-release
            
            # 4. Package Release
            chmod +x ./c3c/scripts/tools/package_build.sh
            bash ./c3c/scripts/tools/package_build.sh "./build-release/c3c" "c3-android-${{ matrix.architecture }}-Release" "tar"
            
            # 5. Compile and Test the Debug version
            cmake -S c3c -B build-debug -DCMAKE_BUILD_TYPE=Debug
            cmake --build build-debug
            bash ./c3c/scripts/tools/ci_tests.sh "./build-debug/c3c" "android"
            
            # 6. Package Debug
            bash ./c3c/scripts/tools/package_build.sh "./build-debug/c3c" "c3-android-${{ matrix.architecture }}-Debug" "tar"

      - name: Upload Artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: c3-android-${{ matrix.architecture }}-Release
          path: c3-android-${{ matrix.architecture }}-Release.tar.gz

      - name: Upload Artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: c3-android-${{ matrix.architecture }}-Debug
          path: c3-android-${{ matrix.architecture }}-Debug.tar.gz

