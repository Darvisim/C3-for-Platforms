name: CI
on:
  workflow_dispatch:
  
jobs:
  build-azl:
    name: Azure Linux (x64)
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/azurelinux-beta/base/core:4.0
    steps: 
      - name: Bootstrap System Dependencies
        run: |
          dnf check-update || true
          dnf install -y tar git shadow-utils
        
      - uses: actions/checkout@v6
  
      - name: Install Runtime Dependencies
        run: |
          dnf check-update || true
          dnf install -y gcc make
  
      - name: Test
        run: |
          echo "Running tests on Azure Linux 4.0..."
          gcc --version
          
          


